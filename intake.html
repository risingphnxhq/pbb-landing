<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PBB Intake | Rising Phoenix Enterprises</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121c26;
      --line: rgba(255,255,255,0.08);
      --text: #f5efe6;
      --muted: rgba(245,239,230,0.72);
      --gold: #d6b36a;
      --danger-bg: rgba(127,29,29,0.32);
      --danger-border: rgba(248,113,113,0.28);
      --danger-text: #f8d0d0;
      --success-bg: rgba(6,95,70,0.25);
      --success-border: rgba(52,211,153,0.24);
      --success-text: #d1fae5;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.04), transparent 28%),
        radial-gradient(circle at bottom right, rgba(68,115,255,0.08), transparent 24%),
        linear-gradient(180deg, #0a0e13 0%, #0b0f14 100%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      padding: 40px 16px;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.015));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 34px 28px 26px;
      box-shadow: var(--shadow);
    }

    .eyebrow {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .subhead {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
      max-width: 760px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border-radius: 14px;
      padding: 18px 18px;
      font-size: 17px;
      font-family: Georgia, "Times New Roman", serif;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(214,179,106,0.5);
      box-shadow: 0 0 0 3px rgba(214,179,106,0.12);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--text) 50%),
        linear-gradient(135deg, var(--text) 50%, transparent 50%);
      background-position:
        calc(100% - 24px) calc(50% - 3px),
        calc(100% - 18px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 46px;
    }

    option {
      color: #111;
    }

    .submit-btn {
      width: 100%;
      min-height: 62px;
      border: 1px solid rgba(214,179,106,0.28);
      border-radius: 14px;
      background: linear-gradient(180deg, #f0dfb2 0%, #d6b36a 100%);
      color: #1b1b1b;
      font-size: 18px;
      font-weight: 700;
      font-family: Georgia, "Times New Roman", serif;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 14px 34px rgba(214,179,106,0.18);
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 38px rgba(214,179,106,0.24);
    }

    .submit-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 10px 24px rgba(214,179,106,0.12);
    }

    .status {
      display: none;
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 14px;
      font-size: 16px;
      line-height: 1.6;
      border: 1px solid transparent;
    }

    .status.error {
      display: block;
      background: var(--danger-bg);
      border-color: var(--danger-border);
      color: var(--danger-text);
    }

    .status.success {
      display: block;
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }

    .footnote {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    @media (max-width: 640px) {
      .panel {
        padding: 24px 18px 22px;
      }

      .subhead {
        font-size: 17px;
      }

      input,
      select,
      textarea {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <div class="eyebrow">Phoenix Business System</div>
      <h1>Business Intake</h1>
      <p class="subhead">
        Your payment has been confirmed. Complete this intake so Rising Phoenix can place you into the correct execution path.
      </p>

      <form id="intakeForm">
        <div class="field">
          <label for="full_name">Full Name</label>
          <input id="full_name" name="full_name" type="text" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>

        <div class="field">
          <label for="business_name">Business Name</label>
          <input id="business_name" name="business_name" type="text" />
        </div>

        <div class="field">
          <label for="selected_tier">Selected Tier</label>
          <select id="selected_tier" name="selected_tier" required>
            <option value="">Select tier</option>
            <option value="foundation">Foundation</option>
            <option value="structure">Structure</option>
            <option value="scale">Scale</option>
          </select>
        </div>

        <div class="field">
          <label for="notes">Primary Objective</label>
          <textarea id="notes" name="notes" placeholder="State your current objective." required></textarea>
        </div>

        <button id="submitBtn" class="submit-btn" type="submit">Submit Intake</button>

        <div id="statusBox" class="status"></div>

        <div class="footnote">
          After submission, your intake is captured and prepared for tier-based routing.
        </div>
      </form>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://oyjmpbuxvfxusmbouldi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95am1wYnV4dmZ4dXNtYm91bGRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NDkxNTcsImV4cCI6MjA4NTAyNTE1N30.S4P98vRR8AS7vsg5W-Dxg_fEtVoSlKscMOWEsigo5Mk ";

    const form = document.getElementById("intakeForm");
    const submitBtn = document.getElementById("submitBtn");
    const statusBox = document.getElementById("statusBox");

    function showStatus(type, message) {
      statusBox.className = `status ${type}`;
      statusBox.textContent = message;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";
      statusBox.className = "status";
      statusBox.textContent = "";

      const payload = {
        full_name: document.getElementById("full_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        business_name: document.getElementById("business_name").value.trim() || null,
        selected_tier: document.getElementById("selected_tier").value,
        notes: document.getElementById("notes").value.trim() || null,
        intake_status: "received",
        routing_status: "pending",
        source: "pbb_intake"
      };

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/pbb_intakes`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Prefer": "return=minimal"
          },
          body: JSON.stringify(payload)
        });

        const rawText = await response.text();

        if (!response.ok) {
          console.error("Insert failed:", response.status, rawText);
          throw new Error(rawText || "Insert failed");
        }

        localStorage.setItem("pbb_intake", JSON.stringify(payload));
        window.location.href = "/probe.html";
        return;

      } catch (error) {
        console.error(error);
        showStatus(
          "error",
          "Submission failed. Check your Supabase URL, publishable key, table setup, and RLS policy, then try again."
        );
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Intake";
      }
    });
  </script>
</body>
</html>
